name: Daily India & Iraq News Monitor

on:
  # schedule:
  #   # 每天北京时间9:00运行 (UTC 1:00)
  #   - cron: '0 1 * * *'
  # 注释掉 schedule，只使用 cron-job.org 触发，避免重复

  # 允许手动触发（cron-job.org 通过这个触发）
  workflow_dispatch:

  # 代码推送时也可以触发（用于测试）- 已禁用，避免意外触发
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'news_monitor.py'
  #     - '.github/workflows/daily-news.yml'

jobs:
  monitor-news:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run news monitoring
      env:
        SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
        LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
        LARK_USER_ID: ${{ secrets.LARK_USER_ID }}
      run: |
        python news_monitor.py

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: news-monitor-logs-${{ github.run_number }}
        path: |
          *.log
        retention-days: 7
